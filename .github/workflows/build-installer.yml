name: Build Windows Installer

on:
  push:
    branches:
      - main
      - feat/windows-installer
      - user-feedback-fixes

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller PyOpenGL pytest pyconify zarr Pillow colorspacious viscm numba psutil ml-dtypes

      - name: Run freeze import tests
        run: pytest tests/test_freeze_imports.py -v

      - name: Build with PyInstaller
        working-directory: installer
        run: python -m PyInstaller ndviewer_light.spec --noconfirm --distpath ../dist --workpath ../build --clean

      - name: Run smoke tests
        continue-on-error: true
        run: dist\ndviewer_light.exe --smoke-test

      - name: Stage artifact directory
        run: |
          mkdir artifact
          copy dist\ndviewer_light.exe artifact\ndviewer_light.exe
          copy README.md artifact\README.md

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndviewer-light-windows
          path: artifact/*
