name: Build Windows Installer

on:
  push:
    branches:
      - main
      - feat/windows-installer

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller PyOpenGL pytest pyconify zarr Pillow colorspacious viscm numba psutil

      - name: Run freeze import tests
        run: pytest tests/test_freeze_imports.py -v

      - name: Build with PyInstaller
        run: pyinstaller installer/ndviewer_light.spec --noconfirm

      - name: Run smoke tests
        run: dist/ndviewer_light/ndviewer_light.exe --smoke-test

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndviewer-light-windows
          path: dist/
